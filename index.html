<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Solari | Estrategia y Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #cbd5e1; 
            --card: #ffffff; 
            --text-dark: #0f172a; 
            --emerald: #10b981; 
            --border: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            padding: 70px 20px 20px;
            line-height: 1.2;
        }

        .navbar {
            position: fixed; top: 0; left: 0; right: 0;
            background: white; padding: 10px 5%;
            display: flex; justify-content: flex-end;
            border-bottom: 4px solid var(--emerald);
            z-index: 1000;
        }

        .btn-cta {
            background: var(--text-dark); color: white;
            padding: 8px 16px; border-radius: 8px;
            text-decoration: none; font-weight: 700; font-size: 11px;
            text-transform: uppercase;
        }

        .container {
            max-width: 1100px; margin: 0 auto;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;
        }

        .card {
            background: var(--card); border-radius: 20px;
            padding: 15px; 
            border: 1px solid var(--border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* HERO COMPACTO */
        .hero { grid-column: 1 / 4; }
        .hero h1 { font-family: 'Montserrat'; font-size: 38px; letter-spacing: -2px; line-height: 1; margin-bottom: 5px; }
        .hero p.sub { font-weight: 600; color: #475569; font-size: 13px; margin-bottom: 10px; }

        .pilares-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            border-top: 1px solid #cbd5e1; padding-top: 10px;
        }

        .pilar {
            background: #f8fafc; padding: 8px; border-radius: 10px;
            border-left: 5px solid var(--emerald);
        }
        .pilar h3 { font-size: 9px; color: var(--emerald); text-transform: uppercase; margin-bottom: 2px; }
        .pilar p { font-size: 12px; font-weight: 700; color: var(--text-dark); }

        /* VIDEO Y LINKEDIN */
        .sidebar { grid-column: 4 / 5; }
        .video-box { 
            background: #000; border-radius: 15px; overflow: hidden; 
            aspect-ratio: 9/16; width: 100%; border: 1px solid var(--border);
            max-height: 320px; 
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        .link-ln {
            display: block; text-align: center; margin-top: 8px;
            font-weight: 700; color: var(--text-dark); text-decoration: none;
            border: 1px solid var(--border); padding: 8px; border-radius: 10px;
            background: white; font-size: 12px;
        }

        /* GRÁFICOS */
        .dash-row { grid-column: 1 / 3; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .window { background: white; border-radius: 15px; height: 120px; overflow: hidden; border: 1px solid var(--border); }
