<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Solari | Estrategia y Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #f1f5f9; 
            --card: #ffffff; 
            --text-main: #1e293b; 
            --text-muted: #64748b; 
            --accent: #10b981; 
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 80px 20px 40px;
            line-height: 1.6;
        }

        .navbar {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 5%;
            display: flex; justify-content: flex-end;
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .btn-cta {
            background: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-3px); }

        .hero { grid-column: 1 / 4; }
        .hero .tagline { color: var(--accent); font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        h1 { font-family: 'Montserrat', sans-serif; font-size: clamp(2rem, 5vw, 3rem); line-height: 1.1; margin-bottom: 15px; letter-spacing: -1.5px; color: var(--text-main); }
        .intro { font-size: 1rem; color: var(--text-muted); margin-bottom: 25px; max-width: 550px; }

        .pilares {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            border-top: 1px solid var(--border); padding-top: 20px;
        }
        .pilar h3 { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 5px; }
        .pilar p { font-size: 0.85rem; color: var(--text-muted); }

        .sidebar { grid-column: 4 / 5; display: flex; flex-direction: column; gap: 20px; }
        .video-box { 
            background: #000; 
            border-radius: 18px; 
            overflow: hidden; 
            aspect-ratio: 9/16; 
            width: 100%; 
            border: 1px solid var(--border);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        .linkedin-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 12px; border-radius: 12px; background: #f8fafc;
            text-decoration: none; color: var(--text-main); font-weight: 700;
            border: 1px solid var(--border); font-size: 0.8rem;
        }

        .dash-row { grid-column: 1 / 3; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .window { 
            background: white; border-radius: 18px; border: 1px solid var(--border); 
            height: 160px; overflow: hidden;
        }
        .window-head { background: #f8fafc; padding: 8px; display: flex; gap: 5px; border-bottom: 1px solid var(--border); }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #cbd5e1; }
        .window img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }

        .trayectoria { grid-column: 3 / 4; text-align: center; justify-content: center; }
        .trayectoria b { font-size: 2.8rem; color: var(--accent); display: block; font-family: 'Montserrat'; line-height: 1; }
        .trayectoria span { font-size: 0.7rem; text-transform: uppercase; font-weight: 600; color: var(--text-muted); }

        .metodologia { grid-column: 4 / 5; display: flex; flex-wrap: wrap; gap: 6px; align-content: center; justify-content: center; }
        .tag { background: #f1f5f9; padding: 5px 12px; border-radius: 10px; font-size: 0.65rem; font-weight: 700; color: var(--text-muted); border: 1px solid var(--border); }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .hero, .sidebar, .dash-row, .trayectoria, .metodologia { grid-column: 1 / -1; }
        }
    </style>
</head>
