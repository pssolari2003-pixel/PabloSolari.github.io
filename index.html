<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Solari | Gestión de Negocios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 600;
            letter-spacing: -2px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            color: #a0a0a0;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn {
            display: inline-block;
            padding: 15px 35px;
            border: 1px solid #404040;
            color: white;
            text-decoration: none;
            border-radius: 2px;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }

        .btn:hover {
            background-color: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pablo Solari</h1>
        <p class="subtitle">Contador Público<br>Gestión de Negocios</p>
        
        <div class="contact-links">
            <a href="https://wa.me/5493512589176" class="btn" target="_blank">Contactar</a>
        </div>
    </div>

</body>
</html>
