<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Solari | Consultoría de Gestión</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --blur-fx: blur(6px); /* Nivel de desenfoque inicial */
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #1e293b, #0f172a);
            color: white;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
        }

        header h1 {
            font-size: clamp(3rem, 7vw, 4.5rem);
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .main-layout {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
        }

        .bento-item {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid var(--border);
            transition: 0.4s ease;
        }

        /* Panel Izquierdo */
        .video-wrapper {
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        video { width: 100%; display: block; }

        .trajectory-box strong { color: var(--primary); }

        /* Panel Derecho: Servicios e Interacción */
        .services-container {
            height: fit-content;
            cursor: pointer;
        }

        .services-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
            transition: 0.3s ease;
        }

        .service-tag {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            font-size: 0.95rem;
        }

        /* MAGIA: Contenedor de Dashboards "Esfumados" */
        .preview-dashboards {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            /* Estado Inicial: Esfumado */
            filter: var(--blur-fx);
            opacity: 0.3; /* Muy tenue */
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1); /* Transición suave */
        }

        /* MAGIA: Al pasar el mouse, se revelan y enfocan */
        .services-container:hover .preview-dashboards {
            filter: blur(0px); /* Sin desenfoque */
            opacity: 1; /* Totalmente visible */
            transform: scale(1.02); /* Un leve aumento de tamaño */
        }

        /* MAGIA: Cuando los dashboards están enfocados, esfumamos un poco el texto de servicios */
        .services-container:hover .services-list {
            opacity: 0.6;
            filter: blur(1px);
        }

        .preview-dashboards img {
            width: 100%;
            border-radius: 15px;
            border: 2px solid var(--primary);
            box-shadow: 0 0px 20px rgba(0, 210, 255, 0.1);
            transition: 0.3s;
        }

        .services-container:hover .preview-dashboards img {
            box-shadow: 0 10px 40px rgba(0, 210, 255, 0.3);
        }

        .btn-wa {
            display: block;
            background: linear-gradient(45deg, #25d366, #128c7e);
            color: white;
            text-align: center;
            padding: 16px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 25px;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.15);
        }

        h2 { color: var(--primary); margin-bottom: 10px; font-size: 1.6rem; }
        p { color: #cbd5e1; line-height: 1.6; }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
            .preview-dashboards { grid-template-columns: 1fr; }
            .services-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Pablo Solari</h1>
