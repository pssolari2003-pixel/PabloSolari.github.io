<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Solari | Estrategia y Control</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Reducimos el padding superior del body para que todo suba */
        body { 
            background: #cbd5e1; 
            color: #0f172a; 
            font-family: 'Inter', sans-serif; 
            padding: 80px 20px 30px; /* Compactamos padding top y bottom */
        }
        
        .navbar { 
            position: fixed; top: 0; left: 0; right: 0; 
            background: white; 
            padding: 10px 5%; /* Navbar más fino */
            display: flex; justify-content: flex-end; 
            border-bottom: 4px solid #10b981; 
            z-index: 1000; 
        }
        
        .btn-cta { 
            background: #0f172a; 
            color: white; 
            padding: 8px 16px; /* Botón más compacto */
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 11px; /* Texto un punto más chico */
            text-transform: uppercase;
        }

        /* Grid principal */
        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; /* Gap reducido para compactar */
        }
        
        /* Estilo general de tarjetas con padding reducido */
        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 20px; /* Padding reducido de 30px a 20px */
            border: 1px solid #94a3b8; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }

        /* HERO - Achicado para subir los gráficos */
        .hero { grid-column: 1 / 4; }
        
        /* Título más compacto */
        h1 { 
            font-family: 'Montserrat'; 
            font-size: 42px; /* Un poco más chico */
            letter-spacing: -2px; 
            line-height: 1; 
            margin-bottom: 12px; /* Margen reducido */
        }
        
        /* Subtítulo más compacto */
        .subtitle { 
            color: #475569; 
            font-weight: 600; 
            font-size: 14px; /* Un punto más chico */
            margin-bottom: 15px; /* Margen reducido */
        }
        
        /* Grilla de pilares más compacta */
        .pilares-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; /* Gap reducido */
            margin-top: 15px; /* Margen top reducido */
            border-top: 1px solid #cbd5e1; 
            padding-top: 15px; /* Padding top reducido */
        }
        
        /* Cajas de pilares más compactas */
        .pilar { 
            background: #f1f5f9; 
            padding: 10px; /* Padding reducido de 15px a 10px */
            border-radius: 12px; 
            border-left: 5px solid #10b981; 
        }
        .pilar h3 { 
            font-size: 10px; /* Texto un punto más chico */
            color: #10b981; 
            text-transform: uppercase; 
            margin-bottom: 3px; /* Margen reducido */
        }
        .pilar p { 
            font-size: 13px; /* Texto un punto más chico */
            font-weight: 700; 
            line-height: 1.3; /* Interlineado más compacto */
        }

        /* SIDEBAR CON VIDEO Y LINKEDIN - Achicado verticalmente */
        .sidebar { grid-column: 4 / 5; }
        
        /* Contenedor de video más compacto */
        .video-box { 
            background: black; 
            border-radius: 15px; 
            overflow: hidden; 
            aspect-ratio: 9/16; 
            width: 100%; 
            border: 1px solid #94a3b8; 
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Botón de LinkedIn más compacto */
        .link-ln { 
            display: block; 
            text-align: center; 
            margin-top: 8px; /* Margen reducido */
            font-weight: 700; 
            color: #0f172a; 
            text-decoration: none; 
            border: 1px solid #94a3b8; 
            padding: 8px; /* Padding reducido de 10px a 8px */
            border-radius: 10px; 
            background: white; 
            font-size: 13px; /* Texto un punto más chico */
        }

        .window { 
            background: #f8fafc; 
            border-radius: 15px; 
            height: 140px; /* Altura reducida de 150px a 140px */
            overflow: hidden; 
            border: 1px solid #94a3b8; 
        }
        .window img { width: 100%; height: 100%; object-fit: cover; }
