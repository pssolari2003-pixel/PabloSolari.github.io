<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Solari | Estrategia y Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #d1d5db; /* Gris sólido neutro */
            --card: #e5e7eb; /* Gris más claro para recuadros */
            --text-dark: #0f172a; 
            --emerald: #10b981; 
            --border: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            padding: 90px 20px 40px;
            line-height: 1.5;
        }

        .navbar {
            position: fixed; top: 0; left: 0; right: 0;
            background: #ffffff;
            padding: 15px 5%;
            display: flex; justify-content: flex-end;
            border-bottom: 3px solid var(--emerald);
            z-index: 1000;
        }

        .btn-cta {
            background: var(--text-dark);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            border: 2px solid var(--border);
        }

        /* HERO Y PILARES */
        .hero { grid-column: 1 / 4; }
        .hero h1 { font-family: 'Montserrat'; font-size: 50px; letter-spacing: -2px; line-height: 1; margin-bottom: 15px; }
        
        .pilares-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
            border-top: 2px solid var(--border);
            padding-top: 25px;
        }

        .pilar-item {
            background: rgba(255,255,255,0.4); /* Fondo sutil para que resalte del gris */
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--emerald); /* El color que pediste para que salte */
        }

        .pilar-item h3 { font-size: 12px; color: var(--emerald); text-transform: uppercase; margin-bottom: 5px; font-weight: 800; }
        .pilar-item p { font-size: 14px; color: var(--text-dark); font-weight: 500; }

        /* VIDEO Y LATERAL */
        .sidebar { grid-column: 4 / 5; display: flex; flex-direction: column; gap: 20px; }
        .video-box { 
            background: #000; border-radius: 15px; overflow: hidden; 
            aspect-ratio: 9/16; width: 100%; border: 2px solid var(--border);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        .linkedin-btn {
            background: white; border: 2px solid var(--border); padding: 12px;
            border-radius: 12px; text-align: center; text-decoration: none;
            color: var(--text-dark); font-weight: 700; font-size: 14px;
        }

        /* DASHBOARDS */
        .dash-row { grid-column: 1 / 3; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .window { background: white; border-radius: 15px; height: 160px; overflow: hidden; border: 2px solid var(--border); }
        .window img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }

        /* TRAYECTORIA */
        .trayectoria { grid-column: 3 / 4; text-align: center; display: flex; flex-direction: column; justify-content: center; background: white; }
        .trayectoria b { font-size: 45px; color: var(--emerald); font-family: 'Montserrat'; line-height: 1; }
        .trayectoria span { font-size: 11px; text-transform: uppercase; font-weight: 700; }

        /* METODOLOGIA */
        .metodologia { grid-column: 4 / 5; display: flex; flex-wrap: wrap; gap: 6px; align-content: center; justify-content: center; }
        .tag { background: white; border: 1px solid var(--border); padding: 5px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .hero, .sidebar, .dash-row, .trayectoria, .metodologia { grid-column: 1 / -1; }
        }
    </style>
</head>

        <a
