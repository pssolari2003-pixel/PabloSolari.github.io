<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Solari | Estrategia & Gestión</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --dark: #0f172a;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: white;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .video-container {
            width: 100%;
            max-width: 800px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(0, 210, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            margin-bottom: 2rem;
        }

        video { width: 100%; display: block; }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            margin: 1rem 0 2rem;
        }

        /* Grid de Imágenes */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 1.5rem;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
        }

        .card img {
            width: 100%;
            border-radius: 1rem;
            margin-bottom: 1rem;
        }

        /* Botón WhatsApp */
        .btn-wa {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #25d366;
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 100;
        }

    </style>
</head>
<body>

    <section class="hero">
        <div class="video-container">
            <video autoplay muted loop playsinline>
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>
        <h1>Pablo Solari</h1>
        <p class="subtitle">Estrategia y Control de Gestión para PyMEs y Proyectos Tecnológicos.</p>
    </section>

    <div class="container">
        <h2 style="margin-bottom: 2rem; text-align: center;">Dashboards de Gestión</h2>
        <div class="grid">
            <div class="card">
                <img src="image_6cc62d.png" alt="Dashboard 1">
                <h3>Análisis de Costos</h3>
                <p>Optimización de procesos operativos.</p>
            </div>
            <div class="card">
                <img src="image_segunda.png" alt="Dashboard 2">
                <h3>Control Comercial</h3>
                <p>KPIs dinámicos en tiempo real.</p>
            </div>
        </div>
    </div>

    <a href="https://wa.me/5493512589176" class="btn-wa">WhatsApp Consultas</a>

</body>
</html>
