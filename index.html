<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Solari | Estrategia y Control de Gestión</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-body: #0a0a0a; 
            --bg-card: #141414; 
            --accent: #007bff; 
            --border: #333; 
            --text-main: #ffffff;
            --text-muted: #b0b0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 80px 20px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 20px 40px;
            display: flex;
            justify-content: flex-end;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
        }

        .btn-nav {
            padding: 12px 25px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            text-transform: uppercase;
            font-size: 0.75rem;
            transition: 0.3s;
        }

        .btn-nav:hover { background: var(--accent); color: #fff; }

        /* GRID BENTO COMPACTO */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 columnas para más flexibilidad */
            grid-template-rows: auto auto;
            gap: 15px;
            max-width: 1300px;
            width: 100%;
        }

        .bento-item {
            background-color: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        /* 1. HERO (Nombre y frase) */
        .item-hero {
            grid-column: 1 / 4;
            grid-row: 1;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            line-height: 0.9;
            margin-bottom: 20px;
            letter-spacing: -3px;
        }

        .proposal-text {
            font-size: 1.1rem;
            font-weight: 300;
            color: var(--text-muted);
            line-height: 1.5;
            max-width: 600px;
        }

        /* 2. VIDEO (Más pequeño a la derecha) */
        .item-video {
            grid-column: 4 / 5;
            grid-row: 1;
            padding: 15px;
            justify-content: center;
        }

        .video-wrapper {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #444;
        }

        video { width: 100%; display: block; }

        /* 3. DASHBOARDS (Ocupan el centro abajo) */
        .item-dashboards-container {
            grid-column: 1 / 3;
            grid-row: 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .window-frame {
            background: #1e1e1e;
            border-radius: 10px;
            border: 1px solid #444;
            overflow: hidden;
        }

        .window-header {
            background: #2d2d2d;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }
        .window-title { margin-left: 8px; font-size: 0.6rem; color: #888; text-transform: uppercase; }

        .window-content img {
            width: 100%;
            display: block;
            filter: blur(2px) contrast(1.05);
            transition: 0.4s;
        }

        .window-frame:hover .window-content img { filter: blur(0); }

        /* 4. SERVICIOS (Suben a la derecha de los dashboards) */
        .item-services-compact {
            grid-column: 3 / 5;
            grid-row: 2;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .service-mini-card {
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .service-mini-card h3 {
            font-family: 'Montserrat', sans-serif;
            color: var(--accent);
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .service-mini-card p {
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.3;
        }
